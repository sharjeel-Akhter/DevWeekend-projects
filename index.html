<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects</title>
    <link rel="shortcut icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS_2DP3gasoLNHV5HnFajRZTKC_XX4pjQChhJdfvik74w&s=10" type="image/x-icon">
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            list-style-type: none;
            text-decoration: none;
        }
        body{
            background-color: rgb(16, 3, 3);
            color: aliceblue;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            font-size: 16px;
        }
         .wrap-outer{
            min-width: 350px;
            max-width: 550px;
            margin: auto; 
        } 
        .header{
            text-align: center;
            margin: 40px 10px;
            background-color: white;
            color: black;
            padding: 30px;
            box-shadow: 3px 4px 3px 5px #fdfbfb;

        }
        .header .title{
            margin: 15px;
            font-size: 35px;
        }
        .header .sub-title{
            margin: 15px;
            font-size: 25px;
        }
        .projects{
            display: flex;
            flex-direction: row;
            justify-content: center;
            flex-wrap:nowrap;
        }
        .project{
            flex: 0 1 250px;
            /* margin: 20px 40px; */
            height: 300px;
            background-color: white;
            width: 500px;
            text-align: center;
            box-shadow: 3px 4px 3px 5px #fdfbfb;
            color: rgb(24, 24, 110);
            font-size: 22px;
            margin-right: 30px;
            
        }
        .project img{
            margin-top: 20px;
            height: 150px;
            width: 250px;
            border-radius: 10px;
        }
        .project .title{
            margin: 20px auto 20px auto;

        }
        .project a{
            padding: 10px;
            margin-top: 40px;
            border: none;
            background-color: brown;
            color: antiquewhite;
            font-weight: 300;
            border-radius: 10px;
            align-items: center;
        }

        @media (max-width:1200px) {
            .projects{
                flex-wrap: wrap;
            }
            .project{
                margin: auto;
                margin-bottom: 30px;
                width: 300px;
            }
        }
      
    </style>
</head>
<body>
    <main>
        <div class="wrap-outer">
            <div class="wrap-inner">
                <div class="header">
                    <p class="title">Dev-Weekend Projects</p>
                    <p class="sub-title">Sharjeel Akhter</p>
                </div>
    
                <div class="projects">
                    <div class="project" id="P1">
                        <img src="https://images.unsplash.com/photo-1531297484001-80022131f5a1?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8cG9ydGZvbGlvfGVufDB8fDB8fHww"
                            alt="">
                        <div class="title">Simple Portfolio</div>
                        <a href="simple-portfolio/index.html" target="_blank">Click Me</a>
                    </div>
                    <div class="project">
                        <img src="https://images.unsplash.com/photo-1606326608606-aa0b62935f2b?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTF8fFF1aXp8ZW58MHx8MHx8fDA%3D"
                            alt="">
                        <div class="title">Quiz App</div>
                        <a href="quiz-js/index.html" target="_blank">Click Me</a>
                    </div>
                    <div class="project">
                        <img src="https://plus.unsplash.com/premium_photo-1689701711439-e54f039f8d97?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTN8fE5ld3N8ZW58MHx8MHx8fDA%3D"
                            alt="">
                        <div class="title">News App</div>
                        <a href="news-js/index.html" target="_blank">Click Me</a>
                    </div>
                </div>
            </div>
    
        </div>
    
    </main>
</body>
</html>
