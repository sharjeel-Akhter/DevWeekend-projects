<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            list-style-type: none;
            text-decoration: none;
        }
        body{
            background-color: rgb(16, 3, 3);
            color: aliceblue;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            font-size: 16px;
        }
 
        .header{
            text-align: center;
            margin: 40px 10px;
            background-color: white;
            color: black;
            padding: 30px;
            box-shadow: 3px 4px 3px 5px #fdfbfb;

        }
        .header .title{
            margin: 15px;
            font-size: 35px;
        }
        .header .sub-title{
            margin: 15px;
            font-size: 25px;
        }
        .projects{
            display: flex;
            /* margin: auto; */
        }
        .project{
            margin: 20px;
            height: 300px;
            background-color: white;
            width: 400px;
            text-align: center;
            box-shadow: 3px 4px 3px 5px #fdfbfb;
            color: rgb(24, 24, 110);
            font-size: 22px;
        }
        .project img{
            margin-top: 20px;
            height: 150px;
            width: 250px;
            border-radius: 10px;
        }
        .project .title{
            margin: 20px auto 20px auto;

        }
        .project a{
            padding: 10px;
            margin-top: 40px;
            border: none;
            background-color: brown;
            color: antiquewhite;
            font-weight: 300;
            border-radius: 10px;
        }

        @media (max-width:800px) {
            .projects{
                flex-wrap: wrap;
            }
            .project{
                margin: auto;
                margin-bottom: 30px;
                width: 300px;
            }
        }
      
    </style>
</head>
<body>
    <main>

        </div>

                <div class="title">Simple Portfolio</div>
                <a href="simple-portfolio/index.html">Click Me</a>

            <div class="project">

                <div class="title">Quiz App</div>
