<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="outer">
            <div class="inner">
                <div class="header">
                    <p class="title">News-App</p>
                    <p class="sub-title">Your Custom News Portal with Selected New Categories</p>
                </div>
                <div class="sections">
                    <span class="active" id="top-headlines?country=us">All</span>
                    <span id="top-headlines?country=us&category=business">Business</span>
                    <span id="everything?q=crypto&sortBy=publishedAt">Crypto</span>
                    <span id="top-headlines?sources=techcrunch">Technology</span>
                    <span id="everything?q=pakistan">Pakistan</span>
                </div>

                <div class="cards">
                </div>
                </div>
            </div>
        </div>
    </main>

    <script src="index.js"></script>
</body>
</html>
