<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="outer">
            <div class="wrap-inner">
            <div class="header">
                <p class="title">Weather App</p>
                <p class="sub-title">Live weather at a glance</p>
            </div>
            <div class="search">
                <input type="text" id="input" placeholder="Enter Your City" autocomplete="off">
                <button>Search</button>
            </div>
            
            <div class="error">Enter valid city</div>

            <div class="card hide">
               <div class="head">
                <p class="city">Layyah</p>
                <div class="time">
                    <span>Wednesday</span>
                    <span>Jun 24, 2026 - 10:50 Am </span>
                </div>
               </div>

               <div class="main">
                <p><i class="bi bi-brightness-high-fill emoji"></i></p>
                <div class="discription">
                    <p class="temp">40&deg;C</p>
                    <p>Clear Sky</p>
                </div>
               </div>

               <div class="sections">
                <div class="humidity sects">
                    <p><i class="bi bi-droplet-fill"></i></p>
                    <p>23%</p>
                    <p>Humidity</p>
                </div>
                <div class="wind sects">
                    <p><i class="bi bi-wind"></i></p>
                    <p>23%</p>
                    <p>Wind</p>
                </div>
                <div class="feels sects">
                    <p><i class="bi bi-thermometer-half"></i></p>
                    <p>23%</p>
                    <p>Feels Like</p>
                </div>
                <div class="visibility sects">
                    <p><i class="bi bi-eye-fill"></i></p>
                    <p>23%</p>
                    <p>Visibility</p>
                </div>
               </div>
            </div>
        </div>
        </div>
        
    </main>
    <script src="script.js"></script>
</body>
</html>
