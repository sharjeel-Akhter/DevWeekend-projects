<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="outer">
            <div class="wrap-inner">
            <div class="header">
                <p class="title">Weather App</p>
                <p class="sub-title">Live weather at a glance</p>
            </div>
            <div class="search">
                <input type="text" id="input" placeholder="Enter Your City" autocomplete="off">
                <button>Search</button>
            </div>
            
            <div class="error"></div>

            <div class="message hide">
                <p>Waiting For Response...</p>
            </div>

            <div class="card">
                <div class="card">
    <div class="head">
        <p class="city">City</p>
        <div class="time">
            <span>Day</span>
            <span>Date - Time</span>
        </div>
    </div>

    <div class="main">
        <i class="bi bi-cloud-sun weather-icon"></i>
        <div class="description">
            <p class="temp">--°C</p>
            <p>Weather Description</p>
        </div>
    </div>

    <div class="sections">
        <div class="humidity sects">
            <p><i class="bi bi-droplet-fill"></i></p>
            <p>--%</p>
            <p>Humidity</p>
        </div>

        <div class="wind sects">
            <p><i class="bi bi-wind"></i></p>
            <p>-- km/h</p>
            <p>Wind</p>
        </div>

        <div class="feels sects">
            <p><i class="bi bi-thermometer-half"></i></p>
            <p>--°</p>
            <p>Feels Like</p>
        </div>

        <div class="visibility sects">
            <p><i class="bi bi-eye-fill"></i></p>
            <p>-- km</p>
            <p>Visibility</p>
        </div>
    </div>
</div>
                </div>
        </div>
        </div>
        
    </main>
    <script src="script.js"></script>
</body>
</html>
